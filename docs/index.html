<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spider-web Dream (Web)</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0a0c12; color: #d4dcef; font: 13px system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #app { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
    #side { border-right: 1px solid #1d2433; padding: 12px; box-sizing: border-box; overflow-y: auto; background: #070a11; }
    h1 { margin: 0 0 4px; font-size: 16px; }
    .sub { margin: 0 0 12px; color: #8da0c0; }
    .row { margin: 6px 0; display: flex; gap: 6px; flex-wrap: wrap; }
    button { background: #1d2740; color: #d4dcef; border: 1px solid #2c3a5c; border-radius: 6px; padding: 6px 9px; cursor: pointer; }
    button:hover { background: #27345a; }
    button.active { background: #ffd766; color: #131720; border-color: #ffd766; }
    label { display: block; margin: 8px 0 2px; color: #9eb0ce; }
    input[type="range"] { width: 100%; }
    .swatch { width: 22px; height: 14px; border: 1px solid #32415f; border-radius: 3px; display: inline-block; vertical-align: middle; margin-left: 6px; }
    #status { margin-top: 10px; white-space: pre-wrap; font: 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; color: #7fa7d8; }
    #canvasWrap { min-width: 0; position: relative; }
    canvas { width: 100%; height: 100%; display: block; }
    .hint { margin-top: 10px; color: #8da0c0; font-size: 12px; line-height: 1.35; }
    .pill { display: inline-block; font: 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; padding: 1px 6px; border: 1px solid #344564; border-radius: 999px; color: #9eb0ce; margin-right: 6px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="side">
      <h1>Dream (Web)</h1>
      <p class="sub">Standalone Pages version. No backend/device.</p>

      <div class="row">
        <button id="toolRipple">1 Ripple</button>
        <button id="toolArea">2 Area</button>
        <button id="toolBead">3 Bead</button>
      </div>
      <div class="row">
        <button id="shuffle">R Shuffle beads</button>
        <button id="clear">X Clear ripples</button>
      </div>
      <div class="row">
        <button id="ambient">A Ambient</button>
        <button id="cycleColor">Space Colour</button>
      </div>

      <label>Ripple colour <span id="colorSwatch" class="swatch"></span></label>
      <label>Trail <span id="trailV"></span></label>
      <input id="trail" type="range" min="0" max="5" step="0.05" value="3">

      <label>Bead colour mix <span id="mixV"></span></label>
      <input id="mix" type="range" min="0.1" max="0.95" step="0.01" value="0.6">

      <label>Signal decay (half-life) <span id="decayV"></span></label>
      <input id="decay" type="range" min="0.15" max="3.0" step="0.05" value="2.5">

      <label>Area reach (hops) <span id="reachV"></span></label>
      <input id="reach" type="range" min="1" max="5" step="1" value="1">

      <label>Area emission / hop <span id="falloffV"></span></label>
      <input id="falloff" type="range" min="0.1" max="0.95" step="0.01" value="0.5">

      <div class="hint">
        <span class="pill">1</span>Ripple from nearest ring edge<br>
        <span class="pill">2</span>Area neighbourhood effect<br>
        <span class="pill">3</span>Click a node to cycle bead type
      </div>

      <div id="status"></div>
    </div>
    <div id="canvasWrap"><canvas id="c"></canvas></div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
